<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Maintenance | 系统维护</title>
    <style>
      :root {
        --bg-color: #f8f9fa;
        --card-bg: #ffffff;
        --accent-color: #3498db;
        --text-main: #2c3e50;
        --text-muted: #7f8c8d;
      }

      * {
        box-sizing: border-box;
        transition: all 0.3s ease;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: var(--bg-color);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        color: var(--text-main);
      }

      /* 语言切换按钮 */
      .lang-switch {
        position: absolute;
        top: 20px;
        right: 20px;
      }

      .lang-btn {
        background: none;
        border: 1px solid var(--accent-color);
        color: var(--accent-color);
        padding: 5px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.9rem;
      }

      .lang-btn:hover {
        background: var(--accent-color);
        color: white;
      }

      .card {
        background: var(--card-bg);
        padding: 3rem;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        text-align: center;
        max-width: 450px;
        width: 90%;
      }

      /* 动画图标 */
      .gear-container {
        position: relative;
        width: 80px;
        height: 80px;
        margin: 0 auto 2rem;
      }

      .gear {
        fill: var(--accent-color);
        animation: rotate 4s linear infinite;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }
      p {
        line-height: 1.6;
        color: var(--text-muted);
        font-size: 1rem;
      }

      .divider {
        height: 1px;
        background: #eee;
        margin: 2rem 0;
      }

      /* 状态标记 */
      .status {
        display: inline-flex;
        align-items: center;
        font-size: 0.85rem;
        background: #e1f5fe;
        color: #0288d1;
        padding: 4px 12px;
        border-radius: 12px;
        margin-bottom: 1rem;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        background: #0288d1;
        border-radius: 50%;
        margin-right: 8px;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
        100% {
          opacity: 1;
        }
      }

      [lang="en"] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="lang-switch">
      <button class="lang-btn" onclick="toggleLang()">English / 中文</button>
    </div>

    <div class="card">
      <div class="gear-container">
        <svg
          class="gear"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.81,11.69,4.81,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.5c-1.93,0-3.5-1.57-3.5-3.5 s1.57-3.5,3.5-3.5s3.5,1.57,3.5,3.5S13.93,15.5,12,15.5z"
          />
        </svg>
      </div>

      <div id="content-zh" lang="zh">
        <div class="status">
          <div class="status-dot"></div>
          系统升级中
        </div>
        <h1>我们很快回来</h1>
        <p>为了给您提供更好的体验，我们的系统正在进行例行升级。请稍后再试。</p>
      </div>

      <div id="content-en" lang="en">
        <div class="status">
          <div class="status-dot"></div>
          System Updating
        </div>
        <h1>We'll be back soon</h1>
        <p>
          Our system is currently undergoing a scheduled upgrade to improve your
          experience. Please check back later.
        </p>
      </div>

      <div class="divider"></div>
      <p style="font-size: 0.8rem">&copy; 2026 XiaMuqingyuan</p>
    </div>

    <script>
      let currentLang = "zh";
      function toggleLang() {
        const zh = document.getElementById("content-zh");
        const en = document.getElementById("content-en");

        if (currentLang === "zh") {
          zh.style.display = "none";
          en.style.display = "block";
          currentLang = "en";
        } else {
          zh.style.display = "block";
          en.style.display = "none";
          currentLang = "zh";
        }
      }
    </script>
  </body>
</html>
